<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Tabs Closure Options</title>
  <style>
    :root {
      --bg: #f5f3f0;
      --card: #fffdfb;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #f76f53;
      --border: rgba(0, 0, 0, 0.08);
      --row: rgba(247, 111, 83, 0.05);
      --row-selected: rgba(247, 111, 83, 0.12);
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #19191b;
        --card: #232325;
        --fg: #e8e6e3;
        --muted: #a6a29e;
        --border: rgba(255, 255, 255, 0.08);
        --row: rgba(247, 111, 83, 0.10);
        --row-selected: rgba(247, 111, 83, 0.20);
        --shadow: 0 10px 36px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Rubik", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      padding: 28px 18px;
    }

    .page {
      width: min(880px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--card);
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .icon-wrap {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: rgba(247, 111, 83, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    h1 {
      font-size: 23px;
      letter-spacing: -0.25px;
      margin-bottom: 3px;
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .warning {
      width: 100%;
      background: rgba(247, 111, 83, 0.09);
      border-radius: 10px;
      padding: 9px 12px;
      color: #c85a3e;
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 14px;
      border: 1px solid rgba(247, 111, 83, 0.18);
    }

    .options {
      display: grid;
      gap: 10px;
      max-height: min(62vh, 680px);
      overflow: auto;
      padding-right: 4px;
    }

    .option {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      cursor: pointer;
      background: var(--row);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
    }

    .option:hover {
      transform: translateY(-1px);
    }

    .option input {
      margin-top: 2px;
      accent-color: var(--accent);
    }

    .option-title {
      font-weight: 600;
      font-size: 14px;
    }

    .option-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .option:has(input:checked) {
      border-color: rgba(247, 111, 83, 0.5);
      background: var(--row-selected);
    }

    .actions {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 500;
      padding: 10px 15px;
      min-width: 110px;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(247, 111, 83, 0.32);
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: #e85e43;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(247, 111, 83, 0.38);
    }

    button:active {
      background: #d44f36;
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(247, 111, 83, 0.25);
    }

    .secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .secondary:hover {
      background: rgba(0, 0, 0, 0.04);
      box-shadow: none;
    }

    .secondary:active {
      background: rgba(0, 0, 0, 0.08);
      box-shadow: none;
    }

    #status {
      min-height: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px 12px;
      }

      .panel {
        border-radius: 14px;
        padding: 16px;
      }

      .header {
        align-items: flex-start;
      }

      .icon-wrap {
        width: 46px;
        height: 46px;
      }

      h1 {
        font-size: 20px;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <div class="header">
        <div class="icon-wrap" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="32" height="32">
            <defs>
              <linearGradient id="zen-bg-opt" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff8a65"/>
                <stop offset="100%" stop-color="#f76f53"/>
              </linearGradient>
            </defs>
            <rect x="1" y="1" width="34" height="34" rx="9" fill="url(#zen-bg-opt)"/>
            <rect x="5" y="8" width="26" height="20" rx="3" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
            <rect x="5" y="8" width="26" height="7" rx="3" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
            <rect x="7" y="10" width="6" height="3" rx="1.5" fill="#fff" opacity="0.95"/>
            <rect x="15" y="10" width="6" height="3" rx="1.5" fill="#fff" opacity="0.55"/>
            <rect x="23" y="10" width="5" height="3" rx="1.5" fill="#fff" opacity="0.30"/>
            <line x1="11" y1="19" x2="25" y2="26" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <line x1="25" y1="19" x2="11" y2="26" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>Tab Closing Behavior</h1>
          <p class="subtitle">Choose what should happen when you use the popup action.</p>
        </div>
      </div>

      <p class="warning">Some actions are destructive and may close all windows or clear browsing history.</p>

      <div class="options">
        <label class="option">
          <input type="radio" name="closeMode" value="open_new_after_close_except_pinned">
          <span>
            <span class="option-title">Open new tab after closing except pinned</span>
            <p class="option-desc">Keeps pinned tabs and opens one new tab.</p>
          </span>
        </label>

        <label class="option">
          <input type="radio" name="closeMode" value="close_all_including_browser">
          <span>
            <span class="option-title">Close all tabs (including browser)</span>
            <p class="option-desc">Closes all normal browser windows.</p>
          </span>
        </label>

        <label class="option">
          <input type="radio" name="closeMode" value="close_all_including_pinned_keep_browser">
          <span>
            <span class="option-title">Close all tabs (including pinned) without closing browser</span>
            <p class="option-desc">Opens one fresh tab and closes all others.</p>
          </span>
        </label>

        <label class="option">
          <input type="radio" name="closeMode" value="except_current_and_pinned">
          <span>
            <span class="option-title">Close all tabs except current and pinned tabs</span>
            <p class="option-desc">Applies to the current window.</p>
          </span>
        </label>

        <label class="option">
          <input type="radio" name="closeMode" value="except_current">
          <span>
            <span class="option-title">Close all tabs except current tab</span>
            <p class="option-desc">Keeps only the active tab in current window.</p>
          </span>
        </label>

        <label class="option">
          <input type="radio" name="closeMode" value="close_tabs_in_other_windows">
          <span>
            <span class="option-title">Close all tabs in other windows</span>
            <p class="option-desc">Keeps all tabs in the current window untouched.</p>
          </span>
        </label>

        <label class="option">
          <input type="radio" name="closeMode" value="except_current_pinned_grouped">
          <span>
            <span class="option-title">Close all tabs except current, pinned, group tabs</span>
            <p class="option-desc">Across all windows; keeps active tab, pinned tabs, and grouped tabs.</p>
          </span>
        </label>

        <label class="option">
          <input type="radio" name="closeMode" value="close_others_current_keep_active_pinned_grouped">
          <span>
            <span class="option-title">Close other tabs in current window (keep active, pinned, and grouped)</span>
            <p class="option-desc">Also closes all tabs in other windows.</p>
          </span>
        </label>
      </div>

      <div class="actions">
        <button id="executeButton" class="secondary" type="button">Execute</button>
        <button id="saveButton" class="secondary" type="button">Save</button>
        <button id="saveExecuteButton" type="button">Save &amp; Execute</button>
        <span id="status" aria-live="polite"></span>
      </div>
    </section>
  </main>
  <script src="options.js"></script>
</body>
</html>
