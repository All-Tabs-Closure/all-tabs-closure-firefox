<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tabs Closure</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 300px;
            font-family: 'Rubik', 'Inter', -apple-system, BlinkMacSystemFont,
                         'Segoe UI', sans-serif;
            background: #f5f3f0;
            color: #1a1a1a;
        }

        .container {
            padding: 26px 22px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        /* Icon */
        .icon-wrap {
            width: 60px;
            height: 60px;
            background: rgba(247, 111, 83, 0.10);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrap img {
            width: 36px;
            height: 36px;
        }

        /* Text */
        .text-block {
            text-align: center;
        }

        h2 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1a1a1a;
            margin-bottom: 7px;
        }

        p {
            font-size: 12.5px;
            line-height: 1.65;
            color: #6b6b6b;
        }

        /* Warning pill */
        .warning {
            width: 100%;
            background: rgba(247, 111, 83, 0.08);
            border-radius: 10px;
            padding: 9px 13px;
            font-size: 11.5px;
            line-height: 1.55;
            color: #c85a3e;
            display: flex;
            align-items: flex-start;
            gap: 6px;
            text-align: left;
        }
        .warning svg {
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* Divider */
        .divider {
            width: 100%;
            height: 1px;
            background: rgba(0, 0, 0, 0.07);
            border-radius: 1px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #f76f53;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: 0.1px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s ease-in-out, transform 0.15s ease-in-out,
                        box-shadow 0.2s ease-in-out;
            box-shadow: 0 2px 8px rgba(247, 111, 83, 0.30);
        }

        button:hover {
            background: #e85e43;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(247, 111, 83, 0.38);
        }

        button:active {
            transform: translateY(0);
            background: #d44f36;
            box-shadow: 0 1px 4px rgba(247, 111, 83, 0.25);
        }

        .secondary-button {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.15);
            color: #1a1a1a;
            box-shadow: none;
            margin-top: 8px;
        }

        .secondary-button:hover {
            background: rgba(0, 0, 0, 0.04);
            box-shadow: none;
        }

        .secondary-button:active {
            background: rgba(0, 0, 0, 0.08);
            box-shadow: none;
        }

        /* ── Dark mode ── */
        @media (prefers-color-scheme: dark) {
            body {
                background: #19191b;
                color: #e8e6e3;
            }

            .icon-wrap {
                background: rgba(247, 111, 83, 0.13);
            }

            h2 {
                color: #e8e6e3;
            }

            p {
                color: #909090;
            }

            .warning {
                background: rgba(247, 111, 83, 0.10);
                color: #e07560;
            }

            .divider {
                background: rgba(255, 255, 255, 0.07);
            }

            .secondary-button {
                border-color: rgba(255, 255, 255, 0.16);
                color: #e8e6e3;
            }

            .secondary-button:hover {
                background: rgba(255, 255, 255, 0.06);
            }

            .secondary-button:active {
                background: rgba(255, 255, 255, 0.10);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrap">
            <!-- Main extension icon — Zen style -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36" role="img" aria-label="Close Tabs Icon">
                <defs>
                    <linearGradient id="zen-bg-ff" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff8a65"/>
                        <stop offset="100%" stop-color="#f76f53"/>
                    </linearGradient>
                </defs>
                <!-- Rounded-square background -->
                <rect x="1" y="1" width="34" height="34" rx="9" fill="url(#zen-bg-ff)"/>
                <!-- Browser window outline -->
                <rect x="5" y="8" width="26" height="20" rx="3" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
                <!-- Tab bar -->
                <rect x="5" y="8" width="26" height="7" rx="3" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
                <!-- Tabs -->
                <rect x="7"  y="10" width="6" height="3" rx="1.5" fill="white" opacity="0.95"/>
                <rect x="15" y="10" width="6" height="3" rx="1.5" fill="white" opacity="0.55"/>
                <rect x="23" y="10" width="5" height="3" rx="1.5" fill="white" opacity="0.30"/>
                <!-- X mark -->
                <line x1="11" y1="19" x2="25" y2="26" stroke="white" stroke-width="3" stroke-linecap="round"/>
                <line x1="25" y1="19" x2="11" y2="26" stroke="white" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>

        <div class="text-block">
            <h2><span data-i18n="popupTitle"></span></h2>
            <p><span data-i18n="popupDescription"></span></p>
        </div>

        <div class="warning">
            <!-- Warning triangle icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
                <path d="M8 2L1.5 14h13L8 2z" fill="none" stroke="#c85a3e" stroke-width="1.5" stroke-linejoin="round"/>
                <line x1="8" y1="7" x2="8" y2="10" stroke="#c85a3e" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="8" cy="12" r="0.75" fill="#c85a3e"/>
            </svg>
            <span data-i18n="popupWarning"></span>
        </div>

        <div class="divider"></div>

        <button id="closeAllTabs">
            <!-- Close icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" width="14" height="14" aria-hidden="true">
                <line x1="3" y1="3" x2="11" y2="11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
                <line x1="11" y1="3" x2="3" y2="11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            <span data-i18n="closeAllTabsButton"></span>
        </button>

        <button id="openOptions" class="secondary-button" type="button">Options</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
