<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="popupPageTitle">All Tabs Closure</title>
    <style>
        @font-face {
            font-family: 'MFB Oldstyle';
            src: url('../Fonts/MFB-Oldstyle-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg: #f5f3f0;
            --fg: #1a1a1a;
            --muted: #6b6b6b;
            --warn: #c85a3e;
            --warn-bg: rgba(247, 111, 83, 0.08);
            --divider: rgba(0, 0, 0, 0.07);
            --icon-bg: rgba(247, 111, 83, 0.10);
            --secondary-border: rgba(0, 0, 0, 0.15);
            --secondary-hover: rgba(0, 0, 0, 0.04);
            --secondary-active: rgba(0, 0, 0, 0.08);
            --theme-bg: rgba(0, 0, 0, 0.06);
            --theme-active: rgba(247, 111, 83, 0.18);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #19191b;
                --fg: #e8e6e3;
                --muted: #909090;
                --warn: #e07560;
                --warn-bg: rgba(247, 111, 83, 0.10);
                --divider: rgba(255, 255, 255, 0.07);
                --icon-bg: rgba(247, 111, 83, 0.13);
                --secondary-border: rgba(255, 255, 255, 0.16);
                --secondary-hover: rgba(255, 255, 255, 0.06);
                --secondary-active: rgba(255, 255, 255, 0.10);
                --theme-bg: rgba(255, 255, 255, 0.08);
                --theme-active: rgba(247, 111, 83, 0.28);
            }
        }

        html[data-theme='light'] {
            --bg: #f5f3f0;
            --fg: #1a1a1a;
            --muted: #6b6b6b;
            --warn: #c85a3e;
            --warn-bg: rgba(247, 111, 83, 0.08);
            --divider: rgba(0, 0, 0, 0.07);
            --icon-bg: rgba(247, 111, 83, 0.10);
            --secondary-border: rgba(0, 0, 0, 0.15);
            --secondary-hover: rgba(0, 0, 0, 0.04);
            --secondary-active: rgba(0, 0, 0, 0.08);
            --theme-bg: rgba(0, 0, 0, 0.06);
            --theme-active: rgba(247, 111, 83, 0.18);
        }

        html[data-theme='dark'] {
            --bg: #19191b;
            --fg: #e8e6e3;
            --muted: #909090;
            --warn: #e07560;
            --warn-bg: rgba(247, 111, 83, 0.10);
            --divider: rgba(255, 255, 255, 0.07);
            --icon-bg: rgba(247, 111, 83, 0.13);
            --secondary-border: rgba(255, 255, 255, 0.16);
            --secondary-hover: rgba(255, 255, 255, 0.06);
            --secondary-active: rgba(255, 255, 255, 0.10);
            --theme-bg: rgba(255, 255, 255, 0.08);
            --theme-active: rgba(247, 111, 83, 0.28);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 300px;
            font-family: 'MFB Oldstyle', 'Rubik', 'Inter', -apple-system, BlinkMacSystemFont,
                         'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--fg);
        }

        .container {
            padding: 26px 22px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .topbar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: -2px;
        }

        .theme-switch {
            display: inline-flex;
            gap: 4px;
            padding: 3px;
            border-radius: 999px;
            background: var(--theme-bg);
        }

        .theme-switch button {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: none;
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;
            padding: 0;
            margin: 0;
        }

        .theme-switch button.active {
            background: var(--theme-active);
        }

        .theme-switch img {
            width: 16px;
            height: 16px;
            opacity: 0.85;
        }

        /* Icon */
        .icon-wrap {
            width: 60px;
            height: 60px;
            background: var(--icon-bg);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrap img {
            width: 36px;
            height: 36px;
        }

        /* Text */
        .text-block {
            text-align: center;
        }

        h2 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--fg);
            margin-bottom: 7px;
        }

        p {
            font-size: 12.5px;
            line-height: 1.65;
            color: var(--muted);
        }

        /* Warning pill */
        .warning {
            width: 100%;
            background: var(--warn-bg);
            border-radius: 10px;
            padding: 9px 13px;
            font-size: 11.5px;
            line-height: 1.55;
            color: var(--warn);
            display: flex;
            align-items: flex-start;
            gap: 6px;
            text-align: left;
        }
        .warning svg {
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* Divider */
        .divider {
            width: 100%;
            height: 1px;
            background: var(--divider);
            border-radius: 1px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #f76f53;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: 0.1px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s ease-in-out, transform 0.15s ease-in-out,
                        box-shadow 0.2s ease-in-out;
            box-shadow: 0 2px 8px rgba(247, 111, 83, 0.30);
        }

        button:hover {
            background: #e85e43;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(247, 111, 83, 0.38);
        }

        button:active {
            transform: translateY(0);
            background: #d44f36;
            box-shadow: 0 1px 4px rgba(247, 111, 83, 0.25);
        }

        .secondary-button {
            background: transparent;
            border: 1px solid var(--secondary-border);
            color: var(--fg);
            box-shadow: none;
            margin-top: 8px;
        }

        .secondary-button:hover {
            background: var(--secondary-hover);
            box-shadow: none;
        }

        .secondary-button:active {
            background: var(--secondary-active);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="theme-switch" role="group" data-i18n-aria-label="themeSwitcherAriaLabel">
                <button id="themeLight" type="button" data-i18n-aria-label="themeLightAriaLabel">
                    <img src="../Third-party-icons/sun.svg" alt="">
                </button>
                <button id="themeDark" type="button" data-i18n-aria-label="themeDarkAriaLabel">
                    <img src="../Third-party-icons/moon.svg" alt="">
                </button>
            </div>
        </div>
        <div class="icon-wrap">
            <!-- Main extension icon — Zen style -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <defs>
        <linearGradient id="backgroundGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ff8a65;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f76f53;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
        </filter>
        <linearGradient id="xGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="rgba(255,255,255,0.75)" />
        </linearGradient>
    </defs>
    
    <!-- Main background -->
    <circle cx="64" cy="64" r="60" fill="url(#backgroundGrad)" filter="url(#shadow)" />
    
    <!-- Browser window shape (now transparent) -->
    <rect x="24" y="30" width="80" height="68" rx="8" ry="8" fill="none" stroke="#ffffff" stroke-width="2" />
    
    <!-- Tab bar (now transparent) -->
    <rect x="24" y="30" width="80" height="16" rx="8" ry="8" fill="none" stroke="#ffffff" stroke-width="2" />
    
    <!-- Tabs -->
    <rect x="28" y="34" width="20" height="8" rx="4" ry="4" fill="rgba(255,255,255,0.85)" opacity="0.7" />
    <rect x="52" y="34" width="20" height="8" rx="4" ry="4" fill="rgba(255,255,255,0.60)" opacity="0.7" />
    <rect x="76" y="34" width="20" height="8" rx="4" ry="4" fill="rgba(255,255,255,0.35)" opacity="0.7" />
    
    <!-- Close icons on tabs -->
    <path d="M42 36 L46 40 M46 36 L42 40" stroke="url(#xGradient)" stroke-width="1" stroke-linecap="round" />
    <path d="M66 36 L70 40 M70 36 L66 40" stroke="url(#xGradient)" stroke-width="1" stroke-linecap="round" />
    <path d="M90 36 L94 40 M94 36 L90 40" stroke="url(#xGradient)" stroke-width="1" stroke-linecap="round" />
    
    <!-- Large X to represent closing -->
    <path d="M40 60 L88 108 M88 60 L40 108"
          stroke="url(#xGradient)"
          stroke-width="12"
          stroke-linecap="round" />
</svg>
            </svg>
        </div>

        <div class="text-block">
            <h2><span data-i18n="popupTitle"></span></h2>
            <p><span data-i18n="popupDescription"></span></p>
        </div>

        <div class="warning">
            <!-- Warning triangle icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
                <path d="M8 2L1.5 14h13L8 2z" fill="none" stroke="#c85a3e" stroke-width="1.5" stroke-linejoin="round"/>
                <line x1="8" y1="7" x2="8" y2="10" stroke="#c85a3e" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="8" cy="12" r="0.75" fill="#c85a3e"/>
            </svg>
            <span data-i18n="popupWarning"></span>
        </div>

        <div class="divider"></div>

        <button id="closeAllTabs">
            <!-- Close icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" width="14" height="14" aria-hidden="true">
                <line x1="3" y1="3" x2="11" y2="11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
                <line x1="11" y1="3" x2="3" y2="11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            <span data-i18n="closeAllTabsButton"></span>
        </button>

        <button id="openOptions" class="secondary-button" type="button"><span data-i18n="popupOptionsButton"></span></button>
        <button id="openLicense" class="secondary-button" type="button"><span data-i18n="popupLicenseButton"></span></button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
